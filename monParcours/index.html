<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Parcours</title>
    <link rel="stylesheet" href="monParcours.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <!-- Theme Toggle Button -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
      <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </button>

    <div class="container">
        <h1 id="name3d" class="name-3d title">Mon Parcours</h1>
        <p class="subtitle">Découvrez mon parcours scolaire et mes expériences professionnelles</p>

        <div class="buttons">
            <button id="btn-scolaire" class="btn">🎓 Parcours Scolaire</button>
            <button id="btn-pro" class="btn">💼 Expériences Professionnelles</button>
            <button id="btn-bts" class="btn">💻 Le parcours BTS SIO</button>
        </div>


        <div id="timeline" class="timeline hidden">
        </div>
        
        <a href="../index.html" class="home-button">
            ← Retour à l'accueil
        </a>
    </div>

    <div id="swot-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="close-btn">&times;</button>
            <div id="modal-body">
                
            </div>
        </div>
    </div>

    <script src="scriptParcours.js"></script>
</body>
</html>
