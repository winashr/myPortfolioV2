<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Projets - Portfolio</title>
    <link rel="stylesheet" href="mesProjets.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>


     
    <canvas id="particleCanvas"></canvas>

    <div class="container">
        <button id="back-btn" class="back-button hidden">
            ← Retour aux projets
        </button>
        
        <div id="projects-overview" class="projects-section">
            <div class="header">
                <h1 id="name3d" class="name-3d">Mes Projets</h1>
                <p>Découvrez mes réalisations et projets de développement web et applications</p>
            </div>
            
            <!-- Écran initial avec catégories -->
            <div id="categories-view" class="categories-view">
                <div class="category-card professional-category" data-category="professional">
                    <div class="category-icon">💼</div>
                    <h2>Projets Professionnels</h2>
                    <p>Expériences en entreprise et stages</p>
                    <div class="project-count">2 projets</div>
                    <div class="arrow-large">→</div>
                </div>
                
                <div class="category-card academic-category" data-category="academic">
                    <div class="category-icon">🎓</div>
                    <h2>Projets Scolaires</h2>
                    <p>Travaux réalisés en formation BTS SIO</p>
                    <div class="project-count">2 projets</div>
                    <div class="arrow-large">→</div>
                </div>
            </div>

            <!-- Affichage des projets par catégorie (Modal) -->
            <div id="projects-list-view" class="projects-list-view hidden">
                <div class="modal-content">
                    <button class="close-modal">✕</button>
                    
                    <div class="category-display-header">
                        <div class="category-icon-large"></div>
                        <h2 id="category-title"></h2>
                        <p id="category-description"></p>
                    </div>

                    <div class="projects-grid" id="projects-grid">
                        <!-- Les cartes de projets seront générées ici -->
                    </div>
                </div>
            </div>
            
            <a href="../index.html" class="home-button">
                ← Retour à l'accueil
            </a>
        </div>

        <div id="project-detail" class="project-detail hidden">
            <div class="detail-card">
                <button class="close-modal">✕</button>
                <div class="detail-header">
                    <h1 id="detail-title">Titre du projet</h1>
                </div>
                <div class="detail-content">
                    <div class="tech-badges-detail"></div>
                    <div class="description"></div>
                    <div class="features-grid"></div>
                    <div class="project-links"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="mesProjetscript.js"></script>
</body>
</html>
